# ============================================================
# system_params.yaml — 系统运行参数配置
# ============================================================

# ------------------------------------------------------------
# 路径配置
# ------------------------------------------------------------
SAVE_DIR: "data"          # 数据根目录（图谱、知识库等持久化文件）
MODEL_DIR: "models"       # OCR 本地模型目录（src/ocr/ocr.py 使用）

# ------------------------------------------------------------
# 知识库配置
# ------------------------------------------------------------
KB_TYPE: "chroma"                   # 知识库后端类型
enable_reranker: false              # 是否启用重排序（BGEReranker，需额外依赖）

# 入库切块：相邻句 Embedding 余弦相似度（见 embedding_sentence_chunk）
embedding_chunk_adjacent_threshold: 0.42   # 相邻句余弦低于此则新块（与入库 embedding 同空间）
embedding_chunk_max_chars: 4000
embedding_chunk_embed_batch_size: 64

# 检索参数
retrieval_recall_top_k: 20          # 向量库首次召回条数（重排前）
top_k: 5                            # 重排后送入 LLM 的条数（每知识库）
similarity_threshold: 0.05          # 主知识库相似度阈值

# ------------------------------------------------------------
# 问答 / RAG 上下文长度（避免超过 LLM max_seq_len，如 32k tokens）
# 中文为主时约 1.5～2 字符/token，总输入含 system prompt，宜保守
# ------------------------------------------------------------
qa:
  # 与模型 max_seq_len（如 32768）对齐：总输入含 system prompt，此处仅限制「任务里的上下文」
  max_combined_context_chars: 22000   # RAG+图谱+历史 合计上限（字符）
  max_rag_context_chars: 15000        # 检索片段总长度上限
  max_graph_context_chars: 6000       # GraphRAG 图谱文本上限
  max_history_chars: 2000             # 历史对话块上限
  max_chunk_chars: 5000               # 单条检索片段写入 prompt 前截断
  max_history_messages: 4             # 带入问答的历史轮数（user/assistant 各算一条）
  max_history_message_chars: 1500     # 历史中每条消息最大字符

# ------------------------------------------------------------
# GraphRAG 参数
# ------------------------------------------------------------
graphrag:
  seed_alpha: 0.55                  # 图传播阻尼系数（个性化 PageRank）
                                    # 值越大越偏向种子节点，越小越倾向全图传播
  # 纯向量 RAG 模式下：将「查询与图谱中论文实体」的相关性融合进 chunk 排序（0=忽略图谱，1=只看图谱论文分）
  rag_graph_fusion_weight: 0.35

# 社区摘要生成所使用的模型名称（graph_store.py / community_builder.py）
# 此处填写 model 字段的字面值（如 Qwen/Qwen2.5-7B-Instruct）
default_model: "Qwen/Qwen2.5-7B-Instruct"

# ------------------------------------------------------------
# 嵌入 HTTP 请求配置（chroma.py 使用）
# ------------------------------------------------------------
embedding_http_trust_env: false     # false = 忽略系统代理，避免 TLS 握手超时
embedding_http_timeout: 120         # 总超时（秒）
embedding_http_connect: 45          # 连接超时（秒）

# ------------------------------------------------------------
# 日志配置
# ------------------------------------------------------------
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: logs/app.log
  max_bytes: 10485760               # 10 MB
  backup_count: 5

# ------------------------------------------------------------
# 缓存配置
# ------------------------------------------------------------
cache:
  enabled: true
  type: memory
  ttl: 3600
  max_size: 1000

# ------------------------------------------------------------
# HTTP 请求配置
# ------------------------------------------------------------
request:
  timeout: 30
  max_retries: 3
  retry_delay: 1

# ------------------------------------------------------------
# 并发配置
# ------------------------------------------------------------
concurrency:
  max_workers: 4
  max_connections: 10

# ------------------------------------------------------------
# 文件路径配置（paths.xxx 方式访问）
# ------------------------------------------------------------
paths:
  data_dir: data
  cache_dir: cache
  output_dir: output
  temp_dir: temp

# ------------------------------------------------------------
# 性能配置
# ------------------------------------------------------------
performance:
  batch_size: 10
  chunk_size: 1000
  enable_streaming: true

# ------------------------------------------------------------
# 安全配置
# ------------------------------------------------------------
security:
  enable_rate_limit: true
  rate_limit_per_minute: 60
  enable_cors: true
  allowed_origins: "*"
